version: '3.8'

services:

  mysql-container:
    image: mysql:8.0
    container_name: mysql-container

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: myapplication

    ports:
      - "3306:3306"

    volumes:
      - ./mysql-data:/var/lib/mysql

    networks:
      - springboot-network

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  springboot-app:
    image: ro1hit/foodfiesta-springboot:latest-new
    container_name: springboot-app

    depends_on:
      mysql-container:
        condition: service_healthy

    ports:
      - "8085:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/myapplication?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234

    networks:
      - springboot-network

networks:
  springboot-network:
