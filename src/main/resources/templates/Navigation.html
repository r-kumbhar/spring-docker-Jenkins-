<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav th:fragment="navbar()" class="navbar">
        <a href="/home" class="nav-logo">
            <i class="fa-solid fa-fire-burner"></i> Food Fiesta
        </a>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/products">Menu</a>
            <a href="/location">Location</a>
            <a href="/about">Story</a>
            <!-- Conditional links for logged-in Users -->
            <a th:if="${session.loggedInUser}" href="/dashboard" class="btn btn-outline" style="padding: 10px 24px;">Dashboard</a>
            <!-- Conditional links for logged-in Admins -->
            <a th:if="${session.loggedInAdmin}" href="/admin/services" class="btn btn-outline" style="padding: 10px 24px;">Admin Portal</a>
            <!-- Logout if anyone is logged in -->
            <a th:if="${session.loggedInUser != null || session.loggedInAdmin != null}" href="/logout" class="btn btn-primary" style="padding: 10px 24px; color: white;">Sign Out</a>
            <!-- Sign In if no one is logged in -->
            <a th:if="${session.loggedInUser == null && session.loggedInAdmin == null}" href="/login" class="btn btn-primary" style="padding: 10px 24px; color: white;">Sign In</a>
        </div>
    </nav>
</body>
</html>
