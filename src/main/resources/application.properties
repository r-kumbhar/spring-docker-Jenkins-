#############################################
# MySQL Configuration
#############################################

spring.datasource.url=jdbc:mysql://localhost:3306/foodfiesta?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=Rohit@123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#############################################
# JPA / Hibernate
#############################################

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#############################################
# Server
#############################################

server.port=8080

#############################################
# Swagger
#############################################

springdoc.packages-to-scan=com.example.demo
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=true

#############################################
# Google OAuth
#############################################

spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email